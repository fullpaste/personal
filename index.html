<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --card-bg: rgba(15, 15, 18, 0.72);
    --card-border: rgba(255,255,255,0.07);
    --inner-bg: rgba(255,255,255,0.04);
    --inner-border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: rgba(255,255,255,0.45);
    --accent: #5865f2;
    --online: #23a55a;
    --dnd: #f23f42;
    --idle: #f0b232;
  }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    background: #000;
    color: var(--text);
  }

  /* ── Background Video ── */
  #bg-video {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0;
    opacity: 0.45; filter: brightness(0.6) saturate(0.5);
    pointer-events: none;
  }

  /* ── Overlay gradient ── */
  #bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }

  /* ── Snowflakes ── */
  .snowflakes { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
  .snow { position: absolute; color: rgba(255,255,255,0.55); font-size: 14px; animation: fall linear infinite; }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* ── Page layout ── */
  #page {
    position: relative; z-index: 3;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 10px; padding: 20px;
  }

  /* ── Main card ── */
  .main-card {
    width: 100%; max-width: 680px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 22px;
    padding: 22px;
    backdrop-filter: blur(28px) saturate(1.4);
    -webkit-backdrop-filter: blur(28px) saturate(1.4);
    box-shadow: 0 8px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
    animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Profile header ── */
  .profile-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 18px; }

  .pfp-wrap {
    position: relative; flex-shrink: 0;
    width: 96px; height: 96px;
  }
  .pfp-wrap img.pfp {
    width: 96px; height: 96px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.1);
  }
  /* Angel wings decoration overlay */
  .pfp-wrap .wings {
    position: absolute; inset: -22px;
    background: url('https://i.imgur.com/placeholder.png') center/contain no-repeat;
    pointer-events: none; z-index: 2;
  }
  /* Wings drawn with CSS */
  .pfp-wrap::before, .pfp-wrap::after {
    content: '';
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 38px; height: 64px;
    background: linear-gradient(135deg, rgba(200,170,255,0.7) 0%, rgba(140,100,220,0.3) 60%, transparent 100%);
    border-radius: 60% 10% 10% 60%;
    filter: blur(1px);
    pointer-events: none; z-index: 2;
  }
  .pfp-wrap::before { left: -30px; transform: translateY(-50%) scaleX(-1); }
  .pfp-wrap::after  { right: -30px; }

  .profile-info { flex: 1; }
  .name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .username {
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.7));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .badges { display: flex; gap: 5px; align-items: center; }
  .badge { font-size: 16px; filter: drop-shadow(0 0 4px rgba(255,255,255,0.3)); }

  .bio {
    font-size: 13.5px; color: var(--muted);
    margin-top: 5px; margin-bottom: 4px;
    line-height: 1.5;
  }
  .bio a { color: rgba(255,255,255,0.65); text-decoration: none; }
  .bio a:hover { color: #fff; }
  .join-date {
    font-size: 11.5px; color: rgba(255,255,255,0.3);
    display: flex; align-items: center; gap: 4px;
  }

  /* ── Widgets row ── */
  .widgets { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

  .widget {
    background: var(--inner-bg);
    border: 1px solid var(--inner-border);
    border-radius: 14px;
    padding: 12px;
    display: flex; align-items: center; gap: 11px;
    transition: background 0.2s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .widget:hover { background: rgba(255,255,255,0.07); }

  .widget-pfp {
    position: relative; flex-shrink: 0;
  }
  .widget-pfp img {
    width: 44px; height: 44px;
    border-radius: 50%; object-fit: cover;
    border: 1.5px solid rgba(255,255,255,0.1);
  }
  .status-dot {
    position: absolute; bottom: 0; right: 0;
    width: 13px; height: 13px; border-radius: 50%;
    border: 2.5px solid rgba(15,15,18,0.9);
  }
  .status-dot.online { background: var(--online); }
  .status-dot.dnd    { background: var(--dnd); }
  .status-dot.idle   { background: var(--idle); }
  .status-dot.offline{ background: #747f8d; }

  .widget-info { flex: 1; min-width: 0; }
  .widget-name {
    font-size: 13.5px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .widget-tag { font-size: 11px; color: var(--muted); font-weight: 400; }
  .widget-sub {
    font-size: 11px; color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .widget-sub span { color: rgba(255,255,255,0.65); }

  /* GitHub widget specifics */
  .widget-badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }
  .gh-stats { display: flex; gap: 10px; margin-top: 4px; }
  .gh-stat { font-size: 10.5px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
  .view-btn {
    margin-top: 5px;
    display: inline-flex; align-items: center; gap: 4px;
    background: #23a55a; color: #fff;
    border: none; border-radius: 6px;
    padding: 3px 9px; font-size: 10.5px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s;
    text-decoration: none;
  }
  .view-btn:hover { background: #1d8f4d; }

  /* Discord activity */
  .activity-game {
    margin-top: 3px; font-size: 10px; color: rgba(255,255,255,0.35);
    display: flex; align-items: center; gap: 3px;
  }

  /* ── Social icons ── */
  .socials {
    display: flex; justify-content: center; gap: 16px;
    margin-bottom: 14px;
  }
  .social-icon {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--inner-bg);
    border: 1px solid var(--inner-border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
    position: relative;
  }
  .social-icon:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .social-icon img { width: 22px; height: 22px; object-fit: contain; border-radius: 4px; }
  /* Tooltip */
  .social-icon::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 7px); left: 50%;
    transform: translateX(-50%) scale(0.8);
    background: rgba(0,0,0,0.9); color: #fff;
    font-size: 10px; white-space: nowrap;
    padding: 3px 8px; border-radius: 6px;
    opacity: 0; pointer-events: none;
    transition: all 0.15s;
    font-family: 'Outfit', sans-serif;
  }
  .social-icon:hover::after { opacity: 1; transform: translateX(-50%) scale(1); }

  /* Copy toast */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,24,0.95); border: 1px solid rgba(255,255,255,0.1);
    color: #fff; padding: 9px 18px; border-radius: 10px;
    font-size: 12px; backdrop-filter: blur(12px);
    opacity: 0; transition: all 0.25s; z-index: 99;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; align-items: center; gap: 14px;
    font-size: 12px; color: var(--muted);
    padding-top: 2px;
  }
  .stats-bar .sep { opacity: 0.3; }
  .stats-bar span { display: flex; align-items: center; gap: 5px; }

  /* ── Music player card ── */
  .player-card {
    width: 100%; max-width: 680px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 14px 18px;
    backdrop-filter: blur(28px) saturate(1.4);
    -webkit-backdrop-filter: blur(28px) saturate(1.4);
    box-shadow: 0 8px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 14px;
    animation: cardIn 0.5s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }
  .player-art {
    width: 46px; height: 46px; flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; position: relative; overflow: hidden;
  }
  .player-art.spinning { animation: spin 4s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .player-main { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .player-track { font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .player-track .dot { width: 6px; height: 6px; background: var(--online); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

  .player-bar-row { display: flex; align-items: center; gap: 8px; }
  .time { font-size: 10.5px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 32px; }
  .time.right { text-align: right; }
  .progress-track {
    flex: 1; height: 4px; background: rgba(255,255,255,0.12);
    border-radius: 99px; cursor: pointer; position: relative;
  }
  .progress-fill {
    height: 100%; background: #fff; border-radius: 99px;
    width: 0%; transition: width 0.5s linear;
    position: relative;
  }
  .progress-fill::after {
    content: ''; position: absolute; right: -4px; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px; background: #fff; border-radius: 50%;
    opacity: 0; transition: opacity 0.15s;
  }
  .progress-track:hover .progress-fill::after { opacity: 1; }

  .player-controls { display: flex; align-items: center; gap: 14px; }
  .ctrl-btn {
    background: none; border: none; color: var(--muted);
    font-size: 16px; cursor: pointer; padding: 4px;
    transition: color 0.15s, transform 0.1s;
    display: flex; align-items: center;
  }
  .ctrl-btn:hover { color: #fff; transform: scale(1.1); }
  .ctrl-btn.play-pause { color: #fff; font-size: 18px; }

  /* SVG icons for player */
  .icon-prev::before { content: '⏮'; }
  .icon-pause::before { content: '⏸'; }
  .icon-play::before  { content: '▶'; }
  .icon-next::before  { content: '⏭'; }

</style>
</head>

      <button class="ctrl-btn" onclick="audioSeekRelative(10)" title="Next">⏭</button>
    </div>
  </div>

<script>
// ── Snowflakes ──
const snowContainer = document.getElementById('snow-container');
const SNOW_CHARS = ['❄', '✦', '✧', '＊', '·', '∗'];
for (let i = 0; i < 28; i++) {

}

// ── Copy to clipboard ──
function copyText(text, msg) {
  navigator.clipboard.writeText(text).then(() => showToast(msg));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── GitHub API ──
async function loadGitHub() {
  try {
    const r = await fetch('https://api.github.com/users/fullpaste');
    if (!r.ok) return;
    const d = await r.json();
    document.getElementById('gh-avatar').src = d.avatar_url;
    document.getElementById('gh-name').textContent = d.login;
    document.getElementById('gh-followers').innerHTML = `
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" opacity="0.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      ${d.followers} Follower${d.followers !== 1 ? 's' : ''}`;
    document.getElementById('gh-repos').innerHTML = `
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" opacity="0.5"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M3 9h18M9 21V9" stroke="currentColor" stroke-width="2"/></svg>
      ${d.public_repos} Repos`;
    document.getElementById('gh-link').href = d.html_url;
  } catch(e) { /* keep defaults */ }
}
loadGitHub();

// ── Discord Lanyard (live presence) ──

const DISCORD_USER_ID = '396664090895974401';

async function loadDiscord() {
  if (DISCORD_USER_ID === '396664090895974401') {
    // Use static fallback from screenshot
    updateDiscordUI({
      username: '63kc',
      discriminator: '0',

    });

function updateDiscordUI({ username, status, activity, avatar }) {

// ── Music Player ──
const audio = document.getElementById('bg-audio');
const playBtn = document.getElementById('play-btn');
const progressFill = document.getElementById('progress-fill');
const timeCurr = document.getElementById('time-curr');
const timeTotal = document.getElementById('time-total');
const progressTrack = document.getElementById('progress-track');
let playing = false;

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

audio.addEventListener('loadedmetadata', () => {
  timeTotal.textContent = fmt(audio.duration);
});
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  timeCurr.textContent = fmt(audio.currentTime);
});

function togglePlay() {
  if (playing) {
    audio.pause();
    playBtn.textContent = '▶';
    playing = false;
  } else {
    audio.play().catch(()=>{});
    playBtn.textContent = '⏸';
    playing = true;
  }
}

function audioSeekRelative(sec) {
  audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

progressTrack.addEventListener('click', (e) => {
  const rect = progressTrack.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * (audio.duration || 0);
});

// Auto-play on first interaction
document.addEventListener('click', () => {
  if (!playing) togglePlay();
}, { once: true });

// ── View counter (local) ──
const viewKey = 'xd9_views';
let views = parseInt(localStorage.getItem(viewKey) || '518');
views++;
localStorage.setItem(viewKey, views);
document.getElementById('view-count').textContent = views.toLocaleString();
</script>
