<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xd9</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;overflow:hidden;user-select:none}

/* BG */
#bgv{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;filter:brightness(0.42) saturate(0.12) contrast(1.1)}
#bgo{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,0.38);pointer-events:none}

/* SNOW */
.sf{position:fixed;z-index:2;color:rgba(255,255,255,0.55);pointer-events:none;animation:fall linear infinite;font-size:12px}
@keyframes fall{0%{transform:translateY(-20px);opacity:0}5%{opacity:1}90%{opacity:0.4}100%{transform:translateY(108vh);opacity:0}}

/* LAYOUT */
#wrap{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:8px;padding:12px}

/* MAIN CARD */
.card{
  width:100%;max-width:648px;
  background:rgba(14,14,16,0.8);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;
  padding:18px 18px 14px;
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  box-shadow:0 2px 50px rgba(0,0,0,0.75),inset 0 1px 0 rgba(255,255,255,0.05)
}

/* TOP */
.top{display:flex;align-items:flex-start;gap:0;margin-bottom:14px;position:relative}

/* PFP + WINGS */
.pfp-outer{position:relative;flex-shrink:0;width:108px;height:105px;margin-right:12px;margin-top:-4px}
.pfp-outer img{
  position:absolute;z-index:3;
  width:96px;height:96px;
  border-radius:50%;object-fit:cover;
  top:5px;left:6px;
  border:2px solid rgba(255,255,255,0.07)
}
.wings-wrap{position:absolute;inset:-24px -28px;z-index:2;pointer-events:none}
.wings-wrap svg{width:100%;height:100%}

/* INFO */
.pinfo{flex:1;padding-top:4px}
.nrow{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.uname{font-size:25px;font-weight:800;letter-spacing:-0.4px;color:#fff}
.badges{display:flex;align-items:center;gap:3px}

.bio{font-size:13px;color:rgba(255,255,255,0.82);margin-bottom:4px;line-height:1.45}
.bio a{color:inherit;text-decoration:none}
.bio a:hover{text-decoration:underline}
.joined{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,0.3)}

/* WIDGETS */
.widgets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.widget{
  background:rgba(255,255,255,0.033);
  border:1px solid rgba(255,255,255,0.052);
  border-radius:13px;padding:10px 11px;
  display:flex;align-items:center;gap:10px;
  position:relative;overflow:hidden;cursor:default;
  transition:background .15s
}
.widget:hover{background:rgba(255,255,255,0.055)}

/* Avatar inside widget */
.wavatar{position:relative;flex-shrink:0}
.wavatar img{width:46px;height:46px;border-radius:50%;object-fit:cover}
.sdot{
  position:absolute;bottom:-1px;right:-1px;
  width:14px;height:14px;border-radius:50%;
  border:2.5px solid rgb(14,14,16)
}
.s-online{background:#23a55a}
.s-dnd{background:#f23f42}
.s-idle{background:#f0b232}
.s-offline{background:#747f8d}

/* Discord widget text */
.winfo{flex:1;min-width:0}
.wname{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.wtag{font-size:10.5px;font-weight:400;color:rgba(255,255,255,0.38)}
.wact{font-size:10.5px;color:rgba(255,255,255,0.48);display:flex;align-items:center;gap:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Github label */
.ghlabel{position:absolute;top:8px;right:9px;display:flex;align-items:center;gap:3px;font-size:9.5px;color:rgba(255,255,255,0.3);font-weight:500}
.ghstats{display:flex;align-items:center;gap:8px;font-size:10px;color:rgba(255,255,255,0.38);margin-bottom:5px}
.ghstat{display:flex;align-items:center;gap:2px}
.vbtn{
  display:inline-flex;align-items:center;
  background:#3ba55c;color:#fff;border:none;
  border-radius:5px;padding:2px 9px;
  font-size:10.5px;font-weight:600;
  cursor:pointer;font-family:inherit;text-decoration:none;
  transition:background .15s
}
.vbtn:hover{background:#2d8448}

/* SOCIALS */
.socials{display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:10px;padding:2px 0}
.sico{
  position:relative;width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;overflow:hidden
}
.sico:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.5)}
.sico img{width:22px;height:22px;object-fit:contain;filter:drop-shadow(0 0 3px rgba(255,255,255,0.18))}
.sico::before{
  content:attr(data-t);
  position:absolute;bottom:calc(100% + 7px);left:50%;
  transform:translateX(-50%) scale(0.85);
  background:rgba(8,8,10,0.96);border:1px solid rgba(255,255,255,0.08);
  color:#fff;font-size:9.5px;white-space:nowrap;
  padding:2px 7px;border-radius:5px;
  opacity:0;pointer-events:none;transition:all .15s;
  font-family:'Inter',sans-serif;font-weight:500
}
.sico:hover::before{opacity:1;transform:translateX(-50%) scale(1)}

/* STATS */
.sbar{display:flex;align-items:center;gap:10px;font-size:11.5px;color:rgba(255,255,255,0.38)}
.sbar .si{display:flex;align-items:center;gap:4px}
.sbar .sp{color:rgba(255,255,255,0.14);font-size:13px}

/* PLAYER */
.pcard{
  width:100%;max-width:648px;
  background:rgba(14,14,16,0.8);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;padding:13px 15px;
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  box-shadow:0 2px 40px rgba(0,0,0,0.65),inset 0 1px 0 rgba(255,255,255,0.04);
  display:flex;align-items:center;gap:13px
}
.part{
  width:46px;height:46px;flex-shrink:0;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;position:relative
}
.ptag{position:absolute;top:-7px;right:-6px;font-size:12px;filter:drop-shadow(0 0 5px rgba(80,220,80,0.4))}

.pmain{flex:1}
.pbrow{display:flex;align-items:center;gap:7px}
.ptime{font-size:10.5px;font-weight:500;color:rgba(255,255,255,0.5);font-variant-numeric:tabular-nums;min-width:28px}
.ptime.r{text-align:right}
.ptrack{flex:1;height:3px;background:rgba(255,255,255,0.14);border-radius:99px;cursor:pointer;position:relative}
.pfill{height:100%;background:#fff;border-radius:99px;width:0.7%;pointer-events:none;transition:width .4s linear}

.pctrls{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pcb{background:none;border:none;color:rgba(255,255,255,0.55);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;transition:color .15s,transform .1s}
.pcb:hover{color:#fff;transform:scale(1.12)}
.pcb.main{color:#fff}

/* TOAST */
.toast{
  position:fixed;bottom:26px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:rgba(12,12,14,0.97);
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.88);
  padding:7px 14px;border-radius:9px;
  font-size:11px;font-weight:500;
  backdrop-filter:blur(14px);
  opacity:0;transition:all .2s;z-index:99;
  pointer-events:none;white-space:nowrap
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<script>
// ── Snow
const SC=['❄','✦','✧','*','·','∗'];
for(let i=0;i<22;i++){
  const e=document.createElement('span');
  e.className='sf';
  e.textContent=SC[i%SC.length];
  e.style.cssText=`left:${Math.random()*100}%;top:${-10-Math.random()*50}px;font-size:${7+Math.random()*8}px;animation-duration:${7+Math.random()*12}s;animation-delay:${-Math.random()*14}s;opacity:${0.2+Math.random()*0.5}`;
  document.body.appendChild(e);
}

// ── Utils
const go=u=>window.open(u,'_blank');
function cp(t,m){navigator.clipboard.writeText(t).then(()=>showToast(m))}
function showToast(m){
  const el=document.getElementById('toast');
  el.textContent=m;el.classList.add('on');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),2200);
}

// ── Audio
const aud=document.getElementById('aud');
const pfill=document.getElementById('pfill');
const tcEl=document.getElementById('tc');
const ttEl=document.getElementById('tt');
let playing=false;

const fmt=s=>{if(isNaN(s)||!isFinite(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${sec.toString().padStart(2,'0')}`};

aud.addEventListener('loadedmetadata',()=>{ttEl.textContent=fmt(aud.duration)});
aud.addEventListener('timeupdate',()=>{
  if(!aud.duration)return;
  pfill.style.width=(aud.currentTime/aud.duration*100)+'%';
  tcEl.textContent=fmt(aud.currentTime);
});

function togglePlay(){
  if(playing){
    aud.pause();
    document.getElementById('picon').style.display='';
    document.getElementById('pausei').style.display='none';
    playing=false;
  } else {
    aud.play().catch(()=>{});
    document.getElementById('picon').style.display='none';
    document.getElementById('pausei').style.display='';
    playing=true;
  }
}
const skip=s=>{aud.currentTime=Math.max(0,Math.min(aud.duration||0,aud.currentTime+s))};
function seek(e){
  const r=document.getElementById('ptrack').getBoundingClientRect();
  aud.currentTime=Math.max(0,Math.min(aud.duration||0,((e.clientX-r.left)/r.width)*(aud.duration||0)));
}
document.addEventListener('click',()=>{if(!playing)togglePlay()},{once:true});

    document.getElementById('gh-pfp').src=d.avatar_url;

    document.getElementById('ghrepos').innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg> ${d.public_repos} Repos`;
    document.getElementById('ghlink').href=d.html_url;
  }).catch(()=>{});

// ── Lanyard (live Discord presence)
const DID='396664090895974401';
async function lanyard(){
  try{
    const r=await fetch(`https://api.lanyard.rest/v1/users/${DID}`);
    const j=await r.json();
    if(!j.success)return;
    const d=j.data,u=d.discord_user;
    // Avatar
    if(u.avatar){
      const ext=u.avatar.startsWith('a_')?'gif':'webp';
      document.getElementById('dc-pfp').src=`https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${ext}?size=64`;
    }
    // Name + tag
    document.getElementById('dcname').textContent=u.global_name||u.username;
    // Status
    const dotEl=document.getElementById('dcdot');
    dotEl.className='sdot s-'+d.discord_status;
    // Activity text
    let act='';
    if(d.listening_to_spotify&&d.spotify){
      act=`${d.spotify.song} — ${d.spotify.artist}`;
      document.querySelector('#dc-pfp').closest('.widget').querySelector('.wact').innerHTML=`<span>🎵</span><span id="dcact">${act}</span>`;
    } else if(d.activities?.length){
      const a=d.activities.find(x=>x.type===4)||d.activities[0];
      act=a.state||a.details||a.name||'';
      document.getElementById('dcact').textContent=act||'UPDATED WEBSITE, IN BIO';
    }
    setTimeout(lanyard,15000);
  }catch(e){setTimeout(lanyard,30000)}
}
lanyard();

</script>
