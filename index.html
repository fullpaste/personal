  <!-- GUNS ADDON (widgets only) -->
  <script>
    /* ── show controls after start ── */
    const _origStart = startScreen.onclick || null;
    function _onStart() {
      document.getElementById('controls').style.display = '';
      document.getElementById('top-controls').style.display = '';
      document.getElementById('guns-player').style.display = 'flex';
    }
    startScreen.addEventListener('click', _onStart);
    startScreen.addEventListener('touchstart', _onStart, {passive:false});

    /* ── copy address toast ── */
    function copyAddr(txt, label) {
      navigator.clipboard.writeText(txt).then(() => {
        const t = document.getElementById('guns-toast');
        t.textContent = label + ' address copied!';
        t.style.opacity = '1';
        t.style.transform = 'translateX(-50%) translateY(0)';
        clearTimeout(t._t);
        t._t = setTimeout(() => {
          t.style.opacity = '0';
          t.style.transform = 'translateX(-50%) translateY(14px)';
        }, 2200);
      });
    }

    /* ── music player ── */
    const aud = document.getElementById('background-music');
    let _playing = false;
    const _fmt = s => isFinite(s) ? `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}` : '0:00';
    aud.addEventListener('loadedmetadata', () => { document.getElementById('pt-total').textContent = _fmt(aud.duration); });
    aud.addEventListener('timeupdate', () => {
      if (!aud.duration) return;
      document.getElementById('pt-fill').style.width = (aud.currentTime / aud.duration * 100) + '%';
      document.getElementById('pt-curr').textContent = _fmt(aud.currentTime);
    });
    function playerToggle() {
      if (_playing) {
        aud.pause();
        document.getElementById('pt-play').style.display = '';
        document.getElementById('pt-pause').style.display = 'none';
        _playing = false;
      } else {
        aud.play().catch(() => {});
        document.getElementById('pt-play').style.display = 'none';
        document.getElementById('pt-pause').style.display = '';
        _playing = true;
      }
    }
    function playerSkip(s) { aud.currentTime = Math.max(0, Math.min(aud.duration || 0, aud.currentTime + s)); }
    function playerSeek(e) {
      const r = document.getElementById('pt-track').getBoundingClientRect();
      aud.currentTime = Math.max(0, Math.min(aud.duration || 0, ((e.clientX - r.left) / r.width) * (aud.duration || 0)));
    }

    /* ── GitHub ── */
    fetch('https://api.github.com/users/fullpaste').then(r => r.json()).then(d => {
      document.getElementById('gh-pfp').src = d.avatar_url;
      document.getElementById('gh-name').textContent = d.login;
      document.getElementById('gh-followers').innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg> ${d.followers} Followers`;
      document.getElementById('gh-repos').innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg> ${d.public_repos} Repos`;
      document.getElementById('gh-link').href = d.html_url;
    }).catch(() => {});

    /* ── Discord Lanyard ── */
    async function loadLanyard() {
      try {
        const j = await fetch('https://api.lanyard.rest/v1/users/396664090895974401').then(r => r.json());
        if (!j.success) return;
        const d = j.data, u = d.discord_user;
        if (u.avatar) {
          const ext = u.avatar.startsWith('a_') ? 'gif' : 'webp';
          document.getElementById('dc-pfp').src = `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${ext}?size=80`;
        }
        document.getElementById('dc-name').textContent = u.global_name || u.username;
        const dot = document.getElementById('dc-dot');
        dot.className = 'guns-status s-' + (d.discord_status || 'offline');
        let act = '';
        if (d.listening_to_spotify && d.spotify) {
          act = `${d.spotify.song} — ${d.spotify.artist}`;
        } else if (d.activities?.length) {
          const c = d.activities.find(a => a.type === 4);
          const o = d.activities.find(a => a.type !== 4);
          act = c?.state || o?.details || o?.name || '';
        }
        if (act) document.getElementById('dc-act').textContent = act;
        setTimeout(loadLanyard, 15000);
      } catch { setTimeout(loadLanyard, 30000); }
    }
    loadLanyard();
  </script>

</body>
